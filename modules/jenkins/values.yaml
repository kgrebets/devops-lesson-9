controller:
  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - configuration-as-code:latest
    - credentials-binding:latest
    - github:latest
    - job-dsl:latest
  serviceAccount:
    create: false
    name: ${service_account_name}
  JCasC:
    configScripts:
      credentials: |
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - usernamePassword:
                      scope: GLOBAL
                      id: github-token
                      username: "${github_username}"
                      password: "${github_token}"
                      description: GitHub PAT
      seed-job: |
        jobs:
          - script: >
              job('seed-job') {
                description('Seed job to create pipeline for Docker build/push and GitOps values update')
                scm {
                  git {
                    remote {
                      url('${infra_repository_url}')
                      credentials('github-token')
                    }
                    branches('*/main')
                  }
                }
                steps {
                  dsl {
                    text('''
                      pipelineJob("${pipeline_job_name}") {
                        displayName("${pipeline_job_name}")
                        parameters {
                          stringParam("APP_REPOSITORY", "${app_repository_url}", "Git repository containing Dockerfile")
                          stringParam("GITOPS_REPOSITORY", "${gitops_repository_url}", "GitOps repository with Helm values")
                          stringParam("GITOPS_VALUES_FILE", "${gitops_values_file}", "Path to values.yaml to update")
                          stringParam("ECR_REPOSITORY", "${ecr_repository_url}", "AWS ECR repository URL")
                          stringParam("AWS_REGION", "${aws_region}", "AWS region for ECR login")
                        }
                        definition {
                          cpsScm {
                            scm {
                              git {
                                remote {
                                  url("${infra_repository_url}")
                                  credentials("github-token")
                                }
                                branches("*/main")
                              }
                            }
                            scriptPath("Jenkinsfile")
                          }
                        }
                      }
                    ''')
                  }
                }
              }
